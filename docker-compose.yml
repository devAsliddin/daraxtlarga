version: '3.9'

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yashil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yashil_quest
      POSTGRES_USER: yashil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yashil_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yashil -d yashil_quest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yashil-net

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yashil-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yashil-net

  # ─── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: yashil-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - yashil-net

  # ─── CV Service ─────────────────────────────────────────────────────────────
  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    container_name: yashil-cv
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
    networks:
      - yashil-net

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yashil-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://yashil:${POSTGRES_PASSWORD:-yashil_secret_2026}@postgres:5432/yashil_quest
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-yashil-quest-jwt-secret-production-2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-yashil-quest-refresh-secret-2026}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - CV_SERVICE_URL=http://cv-service:8000
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_TEXT_MODEL=${OLLAMA_TEXT_MODEL:-llama3.1:8b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-llava:7b}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/leaderboard/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - yashil-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yashil-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - yashil-net

networks:
  yashil-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
