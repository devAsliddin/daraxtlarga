version: '3.9'

# Development override - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  cv-service:
    volumes:
      - ./cv-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Don't run frontend/backend in Docker in dev - use local npm
  backend:
    profiles:
      - production

  frontend:
    profiles:
      - production
